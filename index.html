<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Mon nuage de points Potree</title>

  <!-- Potree CSS et JS locaux -->
  <link rel="stylesheet" href="build/potree/potree.css">
  <script src="build/potree/potree.js"></script>

  <style>
    html, body { margin: 0; height: 100%; }
    #potree_render_area { width: 100%; height: 100%; }
  </style>
</head>
<body>

<div id="potree_render_area"></div>

<script>
  // Créer le viewer
  const viewer = new Potree.Viewer(document.getElementById("potree_render_area"));

  viewer.setEDLEnabled(true);       // Lumière
  viewer.setFOV(60);                // Champ de vision
  viewer.setPointBudget(1000000);   // Nombre de points affichés
  viewer.loadSettingsFromURL();     // Charger paramètres depuis URL si besoin

  // Charger ton nuage de points local
  Potree.loadPointCloud("pointclouds/moncloud/metadata.json", "moncloud").then(e => {
      const pc = e.pointcloud;
      viewer.scene.addPointCloud(pc);
      viewer.fitToScreen();
  });
</script>

</body>
</html>
