<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Potree Viewer</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/potree/potree/build/potree/potree.css">
<script src="https://cdn.jsdelivr.net/gh/potree/potree/build/potree/potree.js"></script>

<style>
html, body {
    margin:0;
    height:100%;
}
#potree_render_area{
    width:100%;
    height:100%;
}
</style>
</head>

<body>

<div id="potree_render_area"></div>

<script>

const viewer = new Potree.Viewer(document.getElementById("potree_render_area"));

viewer.setEDLEnabled(true);
viewer.setFOV(60);
viewer.setPointBudget(1000000);

</script>

</body>
</html>
