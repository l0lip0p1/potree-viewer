<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Viewer Potree</title>

  <!-- CSS Potree -->
  <link rel="stylesheet" href="build/potree/potree.css">
</head>
<body>

<div class="potree_container" style="position:absolute; width:100%; height:100%; left:0; top:0;">
  <div id="potree_render_area"></div>
  <div id="potree_sidebar_container"></div>
</div>

<!-- Libs nécessaires dans le bon ordre -->
<script src="libs/jquery/jquery-3.1.1.min.js"></script>
<script src="libs/spectrum/spectrum.js"></script>
<script src="libs/jquery-ui/jquery-ui.min.js"></script>
<script src="libs/other/BinaryHeap.js"></script>
<script src="libs/other/tween.min.js"></script>
<script src="libs/d3/d3.js"></script>
<script src="libs/proj4/proj4.js"></script>
<script src="libs/openlayers3/ol.js"></script>
<script src="libs/i18next/i18next.js"></script>
<script src="libs/jstree/jstree.js"></script>

<!-- Potree -->
<script src="build/potree/potree.js"></script>

<!-- Support LAS/LAZ -->
<script src="libs/plasio/js/laslaz.js"></script>

<script>
  // Initialiser le viewer
  const viewer = new Potree.Viewer(document.getElementById("potree_render_area"));
  viewer.setEDLEnabled(true);
  viewer.setFOV(60);
  viewer.setPointBudget(1000000);
  viewer.loadSettingsFromURL();

  // Charger le nuage
  Potree.loadPointCloud("pointclouds/moncloud/metadata.json", "moncloud").then(e => {
      viewer.scene.addPointCloud(e.pointcloud);
      viewer.fitToScreen();
  });
</script>

</body>
</html>
